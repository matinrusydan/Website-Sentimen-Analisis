<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Analisis Sentimen MBG</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- DataTables CSS -->
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.5/css/dataTables.bootstrap5.min.css">
    
    <style>
        body {
            background-color: #f8f9fa;
        }
        .navbar {
            background-color: #2c3e50;
        }
        .navbar-brand, .nav-link {
            color: white !important;
        }
        .content-container {
            margin-top: 30px;
            margin-bottom: 50px;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="fas fa-chart-pie me-2"></i> Sentimen MBG
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item mb-2">
                        <a class="nav-link text-white {% if request.path == '/' or request.path == '/dashboard' %}active bg-primary{% endif %}" href="/">
                            <i class="fas fa-search me-2"></i>Tahap 1: Scraping Data
                        </a>
                    </li>
                    <li class="nav-item mb-2">
                        <a class="nav-link text-white {% if request.path == '/preprocessing' %}active bg-primary{% endif %}" href="/preprocessing">
                            <i class="fas fa-broom me-2"></i>Tahap 2: Preprocessing
                        </a>
                    </li>
                    <li class="nav-item mb-2">
                        <a class="nav-link text-white {% if request.path == '/finetuning' %}active bg-primary{% endif %}" href="/finetuning">
                            <i class="fas fa-brain me-2"></i>Tahap 3: Pelatihan AI
                        </a>
                    </li>
                    <li class="nav-item mb-2">
                        <a class="nav-link text-white {% if request.path == '/evaluasi' %}active bg-primary{% endif %}" href="/evaluasi">
                            <i class="fas fa-chart-bar me-2"></i>Tahap 4: Evaluasi & Prediksi
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container content-container">
        {% block content %}{% endblock %}
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- jQuery (required for DataTables) -->
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <!-- DataTables JS -->
    <script src="https://cdn.datatables.net/1.13.5/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.5/js/dataTables.bootstrap5.min.js"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    {% block scripts %}{% endblock %}
</body>
</html>
